name: Generate Bootstrap Archives

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Generate Bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder:latest

    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
          - arm

    env:
      NDK_VERSION: "r29"
      NDK_DIR: "/github/home/lib/android-ndk-r29"
      REPO_URL: "https://yatonorai.github.io/terminal-packages/apt/termux-main"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        shell: bash
        run: |
          mkdir -p /github/home/lib
          if [ ! -d "${NDK_DIR}" ]; then
            echo "Downloading Android NDK ${NDK_VERSION}..."
            curl -fLo /tmp/ndk.zip \
              "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
            unzip -q /tmp/ndk.zip -d /github/home/lib/
            rm /tmp/ndk.zip
          fi

      - name: Create output directories
        shell: bash
        run: |
          mkdir -p output/${{ matrix.arch }}
          mkdir -p output/repo

      - name: Setup proxy server to fix Recommends
        shell: bash
        run: |
          pip install flask requests --quiet --break-system-packages 2>/dev/null || \
          pip3 install flask requests --quiet --break-system-packages 2>/dev/null || \
          apt-get install -y python3-flask python3-requests -qq 2>/dev/null || true

          # Cria o servidor proxy
          cat > /tmp/proxy_server.py << 'PYEOF'
          import threading
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import urllib.error

          REAL_REPO = "https://yatonorai.github.io/terminal-packages/apt/termux-main"
          REMOVE_RECOMMENDS_FOR = ["bash"]

          class ProxyHandler(BaseHTTPRequestHandler):
              def log_message(self, format, *args):
                  pass  # silencia logs

              def do_GET(self):
                  url = REAL_REPO + self.path
                  try:
                      with urllib.request.urlopen(url) as resp:
                          data = resp.read()
                          content_type = resp.headers.get("Content-Type", "application/octet-stream")

                      # Se for arquivo Packages, remove Recommends do bash
                      if "Packages" in self.path and not self.path.endswith(".xz"):
                          lines = data.decode("utf-8").split("\n")
                          result = []
                          in_bash = False
                          for line in lines:
                              if line.startswith("Package: bash"):
                                  in_bash = True
                              elif line.startswith("Package: ") and in_bash:
                                  in_bash = False
                              if in_bash and line.startswith("Recommends:"):
                                  continue  # remove Recommends do bash
                              result.append(line)
                          data = "\n".join(result).encode("utf-8")

                      self.send_response(200)
                      self.send_header("Content-Type", content_type)
                      self.send_header("Content-Length", len(data))
                      self.end_headers()
                      self.wfile.write(data)
                  except urllib.error.HTTPError as e:
                      self.send_response(e.code)
                      self.end_headers()
                  except Exception as e:
                      self.send_response(502)
                      self.end_headers()

          server = HTTPServer(("0.0.0.0", 8080), ProxyHandler)
          print("Proxy server started on port 8080")
          server.serve_forever()
          PYEOF

          python3 /tmp/proxy_server.py &
          sleep 3
          echo "Proxy iniciado!"
          curl -s "http://localhost:8080/dists/stable/main/binary-aarch64/Packages" | grep -A 5 "^Package: bash"

      - name: Generate bootstrap archive (debug)
        shell: bash
        run: |
          bash generate-bootstrap-archive.sh \
            -r "http://localhost:8080"

      - name: Generate bootstrap archive (release)
        shell: bash
        run: |
          bash generate-bootstrap-archive.sh \
            -g \
            -r "http://localhost:8080"

      - name: Upload bootstrap archives
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: |
            output/bootstrap-*-${{ matrix.arch }}.zip
            output/bootstrap-*-${{ matrix.arch }}.zip.9
          retention-days: 30
