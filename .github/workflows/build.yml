name: Build & Publish Packages

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish packages after build?'
        required: false
        default: 'false'
        type: boolean

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────
  # Job 1 — Build packages for each architecture
  # ────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h — same as the GitLab pipeline
    container:
      image: ghcr.io/termux/package-builder:latest

    strategy:
      fail-fast: false      # keep building the other arch if one fails
      matrix:
        arch:
          - aarch64
          - arm

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build packages
        run: |
          mkdir -p output
          bash -x build.sh \
            -a "${{ matrix.arch }}" \
            -p "com.yato.fl_ide" \
            -r "${{ vars.FL_IDE_REPO_URL || 'https://raw.githubusercontent.com/${{ github.repository_owner }}/fl-ide-packages/main/apt/termux-main' }}" \
            -s adfa-dev-team.gpg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()   # upload even on failure so logs are accessible
        with:
          name: packages-${{ matrix.arch }}
          path: output/${{ matrix.arch }}/
          retention-days: 7

  # ────────────────────────────────────────────────
  # Job 2 — Generate & sign the APT repository
  # ────────────────────────────────────────────────
  generate-apt-repo:
    name: Generate APT Repository
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download aarch64 packages
        uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: output/aarch64/

      - name: Download arm packages
        uses: actions/download-artifact@v4
        with:
          name: packages-arm
          path: output/arm/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gnupg \
            wget \
            ca-certificates \
            python3

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          gpg --list-secret-keys

      - name: Generate APT repository
        run: |
          bash generate-apt-repo.sh

      - name: Sign the APT repository
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASSPHRASE: ${{ secrets.GPG_KEY_PASSPHRASE }}
        run: |
          echo "$GPG_KEY_PASSPHRASE" | gpg \
            --batch \
            --yes \
            --passphrase-fd 0 \
            --pinentry-mode loopback \
            --digest-algo SHA256 \
            --clearsign \
            -u "${GPG_KEY_ID}" \
            -o ./output/repo/dists/stable/InRelease \
            ./output/repo/dists/stable/Release

      - name: Upload signed APT repository
        uses: actions/upload-artifact@v4
        with:
          name: apt-repo
          path: output/repo/
          retention-days: 7

  # ────────────────────────────────────────────────
  # Job 3 — Publish repository to GitHub Pages
  #          (or swap for rsync/S3 if preferred)
  # ────────────────────────────────────────────────
  publish:
    name: Publish Repository
    runs-on: ubuntu-latest
    needs: generate-apt-repo
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: write   # needed to push to the packages branch

    steps:
      - name: Checkout packages branch
        uses: actions/checkout@v4
        with:
          ref: packages          # dedicated branch that serves as the repo root
          path: packages-branch
          fetch-depth: 0

      - name: Download signed APT repository
        uses: actions/download-artifact@v4
        with:
          name: apt-repo
          path: apt-repo/

      - name: Copy repository files to packages branch
        run: |
          # Mirror under apt/termux-main — adjust path to match your repo URL
          mkdir -p packages-branch/apt/termux-main
          cp -r apt-repo/* packages-branch/apt/termux-main/

      - name: Commit & push
        working-directory: packages-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@fl-ide.dev"
          git config user.name "FL IDE CI"
          git add apt/
          if ! git diff --cached --quiet; then
            git commit -m "chore: apt repo update for ${{ github.sha }}"
            git push origin packages
          else
            echo "No changes to publish."
          fi

  # ────────────────────────────────────────────────
  # Job 4 — Generate bootstrap archives
  #          (optional — runs on demand or on main)
  # ────────────────────────────────────────────────
  bootstrap:
    name: Generate Bootstrap Archives
    runs-on: ubuntu-latest
    needs: generate-apt-repo
    if: github.ref == 'refs/heads/main'
    container:
      image: ghcr.io/termux/package-builder:latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download aarch64 packages
        uses: actions/download-artifact@v4
        with:
          name: packages-aarch64
          path: output/aarch64/

      - name: Download arm packages
        uses: actions/download-artifact@v4
        with:
          name: packages-arm
          path: output/arm/

      - name: Generate bootstrap archives (debug)
        run: |
          bash generate-bootstrap-archive.sh

      - name: Generate bootstrap archives (release)
        run: |
          bash generate-bootstrap-archive.sh -g

      - name: Upload bootstrap archives
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-archives
          path: |
            output/bootstrap-*.zip
            output/bootstrap-*.zip.9
          retention-days: 30
